<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Sulayr Festival</title>
  <meta name="description" content="Sulayr Festival - Descarga la app" />
  <meta property="og:title" content="Sulayr Festival" />
  <meta property="og:description" content="Sulayr Festival - Descarga la app" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sulayrfestival.github.io/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Sulayr Festival" />
  <meta name="twitter:description" content="Sulayr Festival - Descarga la app" />
  <style>
    :root {
      --bg: #07070a;
      --panel: rgba(17, 17, 23, 0.82);
      --panel-border: rgba(255, 255, 255, 0.10);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.68);
      --red: #e10600;
      --red-2: #ff2a2a;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.45;
      color: var(--text);
      background:
        radial-gradient(1200px 700px at 15% 20%, rgba(225, 6, 0, 0.20), transparent 55%),
        radial-gradient(900px 600px at 85% 75%, rgba(255, 42, 42, 0.14), transparent 55%),
        linear-gradient(180deg, #050507, var(--bg));
      padding: 28px 16px;
    }

    .wrap { min-height: calc(100vh - 56px); display: grid; place-items: center; }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 22px 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(225, 6, 0, 1), rgba(255, 42, 42, 1));
      box-shadow: 0 10px 28px rgba(225, 6, 0, 0.25);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .mark::after {
      content: "";
      position: absolute;
      inset: -40px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), transparent 40%);
      transform: rotate(25deg);
    }

    .brand h1 {
      font-size: 18px;
      margin: 0;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .hero {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 18px 0 10px;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.14);
      border-top-color: var(--red);
      border-right-color: rgba(255, 42, 42, 0.55);
      animation: spin 900ms linear infinite;
      flex: 0 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #status {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.1px;
    }

    .hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    a.button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      border-radius: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text);
      background: rgba(0, 0, 0, 0.18);
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
      user-select: none;
    }

    a.button:hover { transform: translateY(-1px); border-color: rgba(255, 255, 255, 0.22); }

    a.button.primary {
      background: linear-gradient(135deg, rgba(225, 6, 0, 1), rgba(255, 42, 42, 1));
      border-color: rgba(225, 6, 0, 0.55);
      color: #ffffff;
      font-weight: 700;
    }

    .footer {
      margin-top: 14px;
      color: rgba(255, 255, 255, 0.58);
      font-size: 12px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.18);
      color: rgba(255, 255, 255, 0.70);
      font-size: 12px;
      margin-top: 12px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--red);
      box-shadow: 0 0 0 6px rgba(225, 6, 0, 0.15);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>Sulayr Festival</h1>
          <p class="subtitle">Descarga segura desde la tienda oficial</p>
        </div>
      </div>

      <div class="hero">
        <div class="spinner" aria-hidden="true"></div>
        <p id="status">Redirigiendo a la app…</p>
      </div>

      <p class="hint">Si no se abre automáticamente, elige tu dispositivo:</p>

      <div class="actions">
        <a class="button primary" id="btn-ios" href="#" rel="noopener">Abrir en App Store</a>
        <a class="button" id="btn-android" href="#" rel="noopener">Abrir en Google Play</a>
      </div>

      <div class="badge"><span class="dot" aria-hidden="true"></span><span>Redirección automática según tu dispositivo</span></div>
      <div class="footer">Si ves algo extraño, vuelve atrás y escanea de nuevo el QR.</div>
    </div>
  </div>

  <script>
    const APP_STORE_URL = "https://www.instagram.com/sulayrfestival/?hl=es";
    const PLAY_STORE_URL = "https://festivalsulayr.es/";
    const WEB_FALLBACK_URL = "https://festivalsulayr.es/";

    function detectTarget() {
      const ua = navigator.userAgent || "";
      const isIOS = /iPad|iPhone|iPod/.test(ua);
      const isAndroid = /Android/.test(ua);

      if (isIOS) return "ios";
      if (isAndroid) return "android";
      return "web";
    }

    function getUrlForTarget(target) {
      if (target === "ios") return APP_STORE_URL;
      if (target === "android") return PLAY_STORE_URL;
      return WEB_FALLBACK_URL;
    }

    function redirectNow() {
      const params = new URLSearchParams(window.location.search || "");
      const debug = params.get("debug") === "1";
      const target = detectTarget();
      const url = getUrlForTarget(target);

      document.getElementById("btn-ios").href = APP_STORE_URL;
      document.getElementById("btn-android").href = PLAY_STORE_URL;

      const status = document.getElementById("status");
      if (target === "ios") status.textContent = "Detectado iPhone/iPad. Redirigiendo a App Store…";
      else if (target === "android") status.textContent = "Detectado Android. Abriendo enlace Android…";
      else status.textContent = "Dispositivo no reconocido. Abriendo web…";

      if (debug) {
        status.textContent = `DEBUG: target=${target} url=${url}`;
        return;
      }

      window.location.replace(url);
    }

    setTimeout(redirectNow, 150);
  </script>
</body>
</html>
